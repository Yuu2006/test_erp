<!DOCTYPE html>
<html lang="vi" class="h-full">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nhập chi phí — EcoTour Guide</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-slate-100">
<div class="max-w-sm mx-auto min-h-screen bg-white flex flex-col shadow-2xl">
  <!-- Header -->
  <div class="bg-gradient-to-r from-amber-500 to-orange-500 text-white px-4 pt-10 pb-4">
    <div class="flex items-center gap-3 mb-0.5"><a href="dashboard.html" class="text-white/70"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></a><h2 class="font-extrabold text-lg">Nhập Chi phí</h2></div>
    <p class="text-amber-100 text-xs">PQE-2507-02 · Ngày 2 · 12/07/2025</p>
    <div class="mt-3 bg-white/15 rounded-xl px-4 py-2 flex items-center justify-between">
      <span class="text-amber-100 text-xs">Ngân sách ngày hôm nay</span>
      <span class="font-extrabold">12.500.000₫</span>
    </div>
  </div>

  <div class="flex-1 overflow-y-auto px-4 py-5 pb-28 space-y-4">
    <!-- Category -->
    <div>
      <label class="text-xs font-semibold text-slate-500 mb-1.5 block">Loại chi phí</label>
      <select class="w-full border-2 border-slate-200 focus:border-amber-400 rounded-xl px-4 py-3 text-sm font-medium outline-none">
        <option>🍽️ Ăn uống</option>
        <option>🚌 Di chuyển / Xe</option>
        <option>🏨 Lưu trú</option>
        <option>🎟️ Vé tham quan</option>
        <option>⚕️ Y tế khẩn cấp</option>
        <option>🛒 Vật tư / Vật dụng</option>
        <option>📦 Khác</option>
      </select>
    </div>

    <!-- Description -->
    <div>
      <label class="text-xs font-semibold text-slate-500 mb-1.5 block">Mô tả</label>
      <input class="w-full border-2 border-slate-200 focus:border-amber-400 rounded-xl px-4 py-3 text-sm outline-none" placeholder="VD: Bữa trưa hải sản nhà hàng Biển Xanh" />
    </div>

    <!-- Amount -->
    <div>
      <label class="text-xs font-semibold text-slate-500 mb-1.5 block">Số tiền (₫)</label>
      <div class="flex items-center border-2 border-amber-300 focus-within:border-amber-500 rounded-xl overflow-hidden">
        <span class="px-3 bg-amber-50 text-amber-600 font-bold text-sm py-3 border-r border-amber-200">₫</span>
        <input type="number" class="flex-1 px-4 py-3 text-lg font-extrabold outline-none" placeholder="0" />
        <span class="px-3 text-slate-400 text-xs">VNĐ</span>
      </div>
    </div>

    <!-- Date/time -->
    <div>
      <label class="text-xs font-semibold text-slate-500 mb-1.5 block">Thời gian</label>
      <input type="datetime-local" class="w-full border-2 border-slate-200 focus:border-amber-400 rounded-xl px-4 py-3 text-sm outline-none" value="2025-07-12T12:30" />
    </div>

    <!-- Supplier -->
    <div>
      <label class="text-xs font-semibold text-slate-500 mb-1.5 block">Nhà cung cấp / Địa điểm</label>
      <input class="w-full border-2 border-slate-200 focus:border-amber-400 rounded-xl px-4 py-3 text-sm outline-none" placeholder="Tên nhà hàng, đơn vị cung cấp..." />
    </div>

    <!-- Receipt photo -->
    <div>
      <label class="text-xs font-semibold text-slate-500 mb-1.5 block">Ảnh hoá đơn / Biên lai</label>
      <div class="border-2 border-dashed border-amber-200 rounded-xl p-5 flex flex-col items-center gap-2 bg-amber-50 cursor-pointer hover:bg-amber-100 transition">
        <div class="w-12 h-12 bg-amber-100 rounded-xl flex items-center justify-center">
          <svg class="w-6 h-6 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </div>
        <p class="text-sm font-semibold text-amber-700">Chụp hoá đơn</p>
        <p class="text-[10px] text-slate-400">Bắt buộc để quyết toán · Tối đa 3 ảnh</p>
      </div>
    </div>

    <!-- Note -->
    <div>
      <label class="text-xs font-semibold text-slate-500 mb-1.5 block">Ghi chú</label>
      <textarea rows="2" class="w-full border-2 border-slate-200 focus:border-amber-400 rounded-xl px-4 py-3 text-sm outline-none resize-none" placeholder="Ghi chú thêm nếu có..."></textarea>
    </div>

    <button class="w-full bg-amber-500 hover:bg-amber-600 text-white font-extrabold py-3.5 rounded-xl text-sm flex items-center justify-center gap-2">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
      Gửi chi phí
    </button>
    <p class="text-[10px] text-slate-400 text-center">Chi phí sẽ gửi xem xét ngay khi nộp</p>
  </div>

  <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-sm bg-white border-t border-slate-200 flex">
    <a href="dashboard.html" class="flex-1 flex flex-col items-center py-2.5 gap-0.5 text-slate-400"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg><span class="text-[9px] font-semibold">Trang chủ</span></a>
    <a href="tour-detail.html" class="flex-1 flex flex-col items-center py-2.5 gap-0.5 text-slate-400"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg><span class="text-[9px] font-semibold">Tour</span></a>
    <a href="eco-action.html" class="flex-1 flex flex-col items-center py-2.5 gap-0.5 text-slate-400"><span class="text-xl leading-none">🌿</span><span class="text-[9px] font-semibold">Eco</span></a>
    <a href="expense-entry.html" class="flex-1 flex flex-col items-center py-2.5 gap-0.5 text-amber-500"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><span class="text-[9px] font-semibold">Chi phí</span></a>
    <a href="incident-report.html" class="flex-1 flex flex-col items-center py-2.5 gap-0.5 text-slate-400"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg><span class="text-[9px] font-semibold">Sự cố</span></a>
  </nav>
</div>
</body>
</html>
