<!DOCTYPE html>
<html lang="vi" class="h-full">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Điểm danh — EcoTour Guide</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body{font-family:'Inter',sans-serif;}
    .chk-row input:checked+label{background:#ecfdf5;border-color:#6ee7b7;}
    .chk-row input:checked+label .chk-circle{background:#059669;border-color:#059669;}
    .chk-row input:checked+label .chk-circle::after{content:'✓';color:white;font-size:10px;font-weight:bold;}
  </style>
</head>
<body class="bg-slate-100">
<div class="max-w-sm mx-auto min-h-screen bg-white flex flex-col shadow-2xl">
  <!-- Header -->
  <div class="bg-gradient-to-r from-emerald-600 to-teal-600 text-white px-4 pt-10 pb-4">
    <div class="flex items-center gap-3 mb-1"><a href="tour-detail.html" class="text-white/70"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></a><h2 class="font-extrabold text-lg">Điểm danh</h2></div>
    <p class="text-emerald-200 text-xs">PQE-2507-02 · 12/07/2025 · Hoạt động: Snorkeling 10:00</p>
    <div class="flex items-center gap-3 mt-3"><div class="flex-1 bg-white/15 rounded-xl p-2 text-center text-sm"><p class="font-extrabold text-xl" id="cnt-present">15</p><p class="text-emerald-200 text-[10px]">Có mặt</p></div><div class="flex-1 bg-white/15 rounded-xl p-2 text-center text-sm"><p class="font-extrabold text-xl text-amber-300" id="cnt-absent">3</p><p class="text-emerald-200 text-[10px]">Vắng</p></div><div class="flex-1 bg-white/15 rounded-xl p-2 text-center text-sm"><p class="font-extrabold text-xl">18</p><p class="text-emerald-200 text-[10px]">Tổng</p></div></div>
  </div>

  <!-- QR scanner -->
  <div class="mx-4 mt-4 border-2 border-dashed border-emerald-300 bg-emerald-50 rounded-2xl p-5 flex flex-col items-center gap-3">
    <div class="w-36 h-36 border-2 border-emerald-400 rounded-xl flex flex-col items-center justify-center bg-white relative">
      <!-- Corner markers -->
      <div class="absolute top-2 left-2 w-5 h-5 border-t-2 border-l-2 border-emerald-500 rounded-tl-sm"></div>
      <div class="absolute top-2 right-2 w-5 h-5 border-t-2 border-r-2 border-emerald-500 rounded-tr-sm"></div>
      <div class="absolute bottom-2 left-2 w-5 h-5 border-b-2 border-l-2 border-emerald-500 rounded-bl-sm"></div>
      <div class="absolute bottom-2 right-2 w-5 h-5 border-b-2 border-r-2 border-emerald-500 rounded-br-sm"></div>
      <svg class="w-10 h-10 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      <p class="text-[9px] text-emerald-500 mt-1 font-medium">Quét QR Code</p>
    </div>
    <p class="text-xs text-emerald-700 font-medium">Hướng camera vào e-ticket của khách</p>
    <p class="text-[10px] text-slate-400">hoặc tìm thủ công bên dưới</p>
  </div>

  <!-- Manual checklist -->
  <div class="flex-1 overflow-y-auto px-4 py-3 pb-28 space-y-2">
    <p class="text-xs font-semibold text-slate-400 mb-1">Điểm danh thủ công</p>
    
    <div class="chk-row"><input type="checkbox" id="p1" checked class="hidden" /><label for="p1" class="flex items-center gap-3 p-3 border border-slate-200 rounded-xl cursor-pointer transition-all">
      <div class="chk-circle w-6 h-6 rounded-full border-2 border-slate-300 flex items-center justify-center bg-emerald-600 border-emerald-600 text-white text-[10px] font-bold">✓</div>
      <div class="flex-1 min-w-0"><p class="text-sm font-semibold truncate">Lê Thị Mai</p><p class="text-[10px] text-slate-400">Phòng 201 · 🚨 Dị ứng</p></div>
      <span class="text-[10px] text-emerald-600 font-bold shrink-0">09:45</span>
    </label></div>

    <div class="chk-row"><input type="checkbox" id="p2" checked class="hidden" /><label for="p2" class="flex items-center gap-3 p-3 border border-slate-200 rounded-xl cursor-pointer transition-all">
      <div class="chk-circle w-6 h-6 rounded-full border-2 border-emerald-600 flex items-center justify-center bg-emerald-600 text-white text-[10px] font-bold">✓</div>
      <div class="flex-1 min-w-0"><p class="text-sm font-semibold truncate">Trần Minh Khoa</p><p class="text-[10px] text-slate-400">Phòng 202 · ⚠️ Cao huyết áp</p></div>
      <span class="text-[10px] text-emerald-600 font-bold shrink-0">09:47</span>
    </label></div>

    <div class="chk-row"><input type="checkbox" id="p3" checked class="hidden" /><label for="p3" class="flex items-center gap-3 p-3 border border-slate-200 rounded-xl cursor-pointer transition-all">
      <div class="chk-circle w-6 h-6 rounded-full border-2 border-emerald-600 flex items-center justify-center bg-emerald-600 text-white text-[10px] font-bold">✓</div>
      <div class="flex-1 min-w-0"><p class="text-sm font-semibold truncate">Nguyễn Thị Anh</p><p class="text-[10px] text-slate-400">Phòng 201</p></div>
      <span class="text-[10px] text-emerald-600 font-bold shrink-0">09:50</span>
    </label></div>

    <div class="chk-row"><input type="checkbox" id="p4" class="hidden" /><label for="p4" class="flex items-center gap-3 p-3 border border-slate-200 rounded-xl cursor-pointer transition-all">
      <div class="chk-circle w-6 h-6 rounded-full border-2 border-slate-300 flex items-center justify-center"></div>
      <div class="flex-1 min-w-0"><p class="text-sm font-semibold truncate">Phạm Thanh Hải</p><p class="text-[10px] text-slate-400">Phòng 203</p></div>
      <span class="text-[10px] text-amber-500 font-bold shrink-0">Chưa đến</span>
    </label></div>

    <div class="chk-row"><input type="checkbox" id="p5" class="hidden" /><label for="p5" class="flex items-center gap-3 p-3 border border-slate-200 rounded-xl cursor-pointer transition-all">
      <div class="chk-circle w-6 h-6 rounded-full border-2 border-slate-300 flex items-center justify-center"></div>
      <div class="flex-1 min-w-0"><p class="text-sm font-semibold truncate">Vũ Ngọc Thảo</p><p class="text-[10px] text-slate-400">Phòng 203</p></div>
      <span class="text-[10px] text-amber-500 font-bold shrink-0">Chưa đến</span>
    </label></div>

    <div class="flex items-center justify-center py-2 text-xs text-slate-400">Hiển thị 5/18 · <button class="ml-1 text-emerald-600 font-semibold">Xem tất cả</button></div>

    <button class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl text-sm mt-2">Lưu điểm danh ✓</button>
  </div>

  <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-sm bg-white border-t border-slate-200 flex">
    <a href="dashboard.html" class="flex-1 flex flex-col items-center py-2.5 gap-0.5 text-slate-400"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg><span class="text-[9px] font-semibold">Trang chủ</span></a>
    <a href="tour-detail.html" class="flex-1 flex flex-col items-center py-2.5 gap-0.5 text-emerald-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg><span class="text-[9px] font-semibold">Tour</span></a>
    <a href="eco-action.html" class="flex-1 flex flex-col items-center py-2.5 gap-0.5 text-slate-400"><span class="text-xl leading-none">🌿</span><span class="text-[9px] font-semibold">Eco</span></a>
    <a href="expense-entry.html" class="flex-1 flex flex-col items-center py-2.5 gap-0.5 text-slate-400"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><span class="text-[9px] font-semibold">Chi phí</span></a>
    <a href="incident-report.html" class="flex-1 flex flex-col items-center py-2.5 gap-0.5 text-slate-400"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg><span class="text-[9px] font-semibold">Sự cố</span></a>
  </nav>
</div>
</body>
</html>
