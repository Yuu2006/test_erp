<!DOCTYPE html>
<html lang="vi" class="h-full">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Báo sự cố — EcoTour Guide</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body{font-family:'Inter',sans-serif;}
    .sev-radio:checked+label{border-width:2px;}
    #sev-light:checked+label{border-color:#94a3b8;background:#f8fafc;}
    #sev-med:checked+label{border-color:#f59e0b;background:#fffbeb;}
    #sev-high:checked+label{border-color:#ef4444;background:#fff1f2;}
  </style>
</head>
<body class="bg-slate-100">
<div class="max-w-sm mx-auto min-h-screen bg-white flex flex-col shadow-2xl">
  <!-- Header -->
  <div class="bg-gradient-to-r from-rose-600 to-red-600 text-white px-4 pt-10 pb-4">
    <div class="flex items-center gap-3 mb-0.5"><a href="dashboard.html" class="text-white/70"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></a><h2 class="font-extrabold text-lg">Báo cáo Sự cố</h2></div>
    <p class="text-rose-200 text-xs">PQE-2507-02 · 12/07/2025 · Phú Quốc</p>
  </div>

  <div class="flex-1 overflow-y-auto px-4 py-5 pb-28 space-y-5">
    <!-- Severity selector -->
    <div>
      <label class="text-xs font-semibold text-slate-500 mb-2 block">Mức độ nghiêm trọng</label>
      <div class="flex gap-2">
        <div class="flex-1">
          <input type="radio" name="sev" id="sev-light" class="sev-radio hidden" />
          <label for="sev-light" class="flex flex-col items-center justify-center p-3 border-2 border-slate-200 rounded-xl cursor-pointer transition-all text-center">
            <span class="text-2xl mb-1">😐</span>
            <span class="text-xs font-bold text-slate-600">Nhẹ</span>
          </label>
        </div>
        <div class="flex-1">
          <input type="radio" name="sev" id="sev-med" class="sev-radio hidden" checked />
          <label for="sev-med" class="flex flex-col items-center justify-center p-3 border-2 border-amber-400 bg-amber-50 rounded-xl cursor-pointer transition-all text-center">
            <span class="text-2xl mb-1">⚠️</span>
            <span class="text-xs font-bold text-amber-700">Trung bình</span>
          </label>
        </div>
        <div class="flex-1">
          <input type="radio" name="sev" id="sev-high" class="sev-radio hidden" />
          <label for="sev-high" class="flex flex-col items-center justify-center p-3 border-2 border-slate-200 rounded-xl cursor-pointer transition-all text-center">
            <span class="text-2xl mb-1">🚨</span>
            <span class="text-xs font-bold text-slate-600">Nghiêm trọng</span>
          </label>
        </div>
      </div>
    </div>

    <!-- Incident type -->
    <div>
      <label class="text-xs font-semibold text-slate-500 mb-1.5 block">Loại sự cố</label>
      <select class="w-full border-2 border-slate-200 focus:border-rose-400 rounded-xl px-4 py-3 text-sm font-medium outline-none">
        <option>🚑 Y tế / Tai nạn</option>
        <option>🚌 Xe trễ / Hỏng xe</option>
        <option>🏨 Vấn đề lưu trú</option>
        <option>🌊 Thời tiết xấu</option>
        <option>💔 Khiếu nại của khách</option>
        <option>📦 Mất / Thất lạc hành lý</option>
        <option>⚡ Khẩn cấp khác</option>
      </select>
    </div>

    <!-- Affected passenger -->
    <div>
      <label class="text-xs font-semibold text-slate-500 mb-1.5 block">Khách liên quan (nếu có)</label>
      <select class="w-full border-2 border-slate-200 focus:border-rose-400 rounded-xl px-4 py-3 text-sm outline-none">
        <option value="">Không có / Cả đoàn</option>
        <option>Lê Thị Mai — Phòng 201</option>
        <option>Trần Minh Khoa — Phòng 202</option>
        <option>Nguyễn Thị Anh — Phòng 201</option>
        <option>Phạm Thanh Hải — Phòng 203</option>
      </select>
    </div>

    <!-- Location -->
    <div>
      <label class="text-xs font-semibold text-slate-500 mb-1.5 block">Vị trí xảy ra</label>
      <input class="w-full border-2 border-slate-200 focus:border-rose-400 rounded-xl px-4 py-3 text-sm outline-none" placeholder="VD: Bãi Sao, Phú Quốc" />
    </div>

    <!-- Time -->
    <div>
      <label class="text-xs font-semibold text-slate-500 mb-1.5 block">Thời gian xảy ra</label>
      <input type="datetime-local" class="w-full border-2 border-slate-200 focus:border-rose-400 rounded-xl px-4 py-3 text-sm outline-none" value="2025-07-12T10:30" />
    </div>

    <!-- Description -->
    <div>
      <label class="text-xs font-semibold text-slate-500 mb-1.5 block">Mô tả chi tiết <span class="text-rose-500">*</span></label>
      <textarea rows="4" class="w-full border-2 border-slate-200 focus:border-rose-400 rounded-xl px-4 py-3 text-sm outline-none resize-none" placeholder="Mô tả đầy đủ sự cố: chuyện gì xảy ra, ai liên quan, hậu quả tức thời, biện pháp đã xử lý..."></textarea>
    </div>

    <!-- Photo -->
    <div>
      <label class="text-xs font-semibold text-slate-500 mb-1.5 block">Ảnh / Video (nếu có)</label>
      <div class="border-2 border-dashed border-rose-200 rounded-xl p-4 flex flex-col items-center gap-2 bg-rose-50 cursor-pointer hover:bg-rose-100 transition">
        <div class="w-10 h-10 bg-rose-100 rounded-xl flex items-center justify-center"><svg class="w-5 h-5 text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg></div>
        <p class="text-xs font-semibold text-rose-600">Đính kèm bằng chứng</p>
      </div>
    </div>

    <!-- Emergency contacts -->
    <div class="bg-rose-50 border border-rose-200 rounded-xl p-4">
      <p class="text-xs font-bold text-rose-700 mb-3">📞 Liên hệ khẩn cấp</p>
      <div class="space-y-2">
        <a href="tel:19001800" class="flex items-center justify-between bg-white border border-rose-200 rounded-lg px-3 py-2"><span class="text-xs font-semibold text-slate-700">🚑 Cấp cứu 115</span><span class="text-xs font-bold text-rose-600">Gọi ngay</span></a>
        <a href="tel:0988123456" class="flex items-center justify-between bg-white border border-slate-200 rounded-lg px-3 py-2"><span class="text-xs font-semibold text-slate-700">📋 Điều hành EcoTour</span><span class="text-xs font-bold text-rose-600">0988 123 456</span></a>
        <a href="tel:0912345678" class="flex items-center justify-between bg-white border border-slate-200 rounded-lg px-3 py-2"><span class="text-xs font-semibold text-slate-700">👨‍💼 Quản lý vận hành</span><span class="text-xs font-bold text-rose-600">0912 345 678</span></a>
      </div>
    </div>

    <button class="w-full bg-rose-600 hover:bg-rose-700 text-white font-extrabold py-3.5 rounded-xl text-sm flex items-center justify-center gap-2">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
      Gửi báo cáo sự cố
    </button>
  </div>

  <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-sm bg-white border-t border-slate-200 flex">
    <a href="dashboard.html" class="flex-1 flex flex-col items-center py-2.5 gap-0.5 text-slate-400"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg><span class="text-[9px] font-semibold">Trang chủ</span></a>
    <a href="tour-detail.html" class="flex-1 flex flex-col items-center py-2.5 gap-0.5 text-slate-400"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg><span class="text-[9px] font-semibold">Tour</span></a>
    <a href="eco-action.html" class="flex-1 flex flex-col items-center py-2.5 gap-0.5 text-slate-400"><span class="text-xl leading-none">🌿</span><span class="text-[9px] font-semibold">Eco</span></a>
    <a href="expense-entry.html" class="flex-1 flex flex-col items-center py-2.5 gap-0.5 text-slate-400"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><span class="text-[9px] font-semibold">Chi phí</span></a>
    <a href="incident-report.html" class="flex-1 flex flex-col items-center py-2.5 gap-0.5 text-rose-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg><span class="text-[9px] font-semibold">Sự cố</span></a>
  </nav>
</div>
</body>
</html>
