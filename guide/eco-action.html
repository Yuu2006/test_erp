<!DOCTYPE html>
<html lang="vi" class="h-full">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eco Action — EcoTour Guide</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-slate-100">
<div class="max-w-sm mx-auto min-h-screen bg-white flex flex-col shadow-2xl">
  <!-- Header -->
  <div class="bg-gradient-to-r from-teal-600 to-emerald-600 text-white px-4 pt-10 pb-4">
    <div class="flex items-center gap-3 mb-0.5"><a href="dashboard.html" class="text-white/70"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></a><h2 class="font-extrabold text-lg">Ghi nhận EcoAction</h2></div>
    <p class="text-emerald-200 text-xs">PQE-2507-02 · Ngày 2/4 · 12/07/2025</p>
  </div>

  <div class="flex-1 overflow-y-auto px-4 py-5 pb-28 space-y-4">
    <!-- Action selector -->
    <div>
      <label class="text-xs font-semibold text-slate-500 mb-1.5 block">Loại EcoAction</label>
      <select class="w-full border-2 border-emerald-200 focus:border-emerald-500 rounded-xl px-4 py-3 text-sm font-medium outline-none" onchange="updateGP(this)">
        <option value="50">🌱 Trồng san hô (+50 GP)</option>
        <option value="30">♻️ Zero-waste packaging (+30 GP)</option>
        <option value="20">🚿 Tiết kiệm nước (+20 GP)</option>
        <option value="80">🏡 Hỗ trợ cộng đồng địa phương (+80 GP)</option>
        <option value="40">🚶 Đi bộ thay xe (+40 GP)</option>
        <option value="60">💧 Lọc nước không dùng chai nhựa (+60 GP)</option>
      </select>
    </div>

    <!-- GreenPoints preview -->
    <div class="bg-gradient-to-r from-emerald-50 to-teal-50 border border-emerald-200 rounded-xl p-4 flex items-center gap-3">
      <div class="w-12 h-12 bg-emerald-500 rounded-xl flex items-center justify-center text-2xl">🌿</div>
      <div><p class="text-xs text-slate-500">GreenPoints sẽ cộng cho 18 khách</p><p class="text-2xl font-extrabold text-emerald-700">+<span id="gp-val">50</span> GP <span class="text-sm font-medium text-slate-400">mỗi người</span></p><p class="text-xs text-emerald-600 font-medium">= <span id="gp-total">900</span> GP cho cả đoàn</p></div>
    </div>

    <!-- Participants -->
    <div>
      <label class="text-xs font-semibold text-slate-500 mb-1.5 block">Số khách tham gia</label>
      <div class="flex items-center gap-3 border-2 border-slate-200 focus-within:border-emerald-400 rounded-xl px-4 py-3"><button type="button" onclick="adjustPax(-1)" class="w-8 h-8 bg-slate-100 hover:bg-slate-200 rounded-lg font-bold text-lg flex items-center justify-center text-slate-600">−</button><span id="pax-val" class="flex-1 text-center font-bold text-slate-800">18 khách</span><button type="button" onclick="adjustPax(1)" class="w-8 h-8 bg-slate-100 hover:bg-slate-200 rounded-lg font-bold text-lg flex items-center justify-center text-slate-600">+</button></div>
    </div>

    <!-- Time picker -->
    <div>
      <label class="text-xs font-semibold text-slate-500 mb-1.5 block">Thời gian thực hiện</label>
      <input type="datetime-local" class="w-full border-2 border-slate-200 focus:border-emerald-400 rounded-xl px-4 py-3 text-sm outline-none" value="2025-07-12T13:00" />
    </div>

    <!-- Photo upload -->
    <div>
      <label class="text-xs font-semibold text-slate-500 mb-1.5 block">Ảnh xác nhận</label>
      <div class="border-2 border-dashed border-emerald-200 rounded-xl p-6 flex flex-col items-center gap-3 bg-emerald-50 cursor-pointer hover:bg-emerald-100 transition">
        <div class="w-14 h-14 bg-emerald-100 rounded-xl flex items-center justify-center">
          <svg class="w-7 h-7 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </div>
        <p class="text-sm font-semibold text-emerald-700">Chụp ảnh hoặc tải lên</p>
        <p class="text-[10px] text-slate-400">JPG/PNG · Tối đa 5 ảnh · Bắt buộc để xác nhận GP</p>
      </div>
    </div>

    <!-- Notes -->
    <div>
      <label class="text-xs font-semibold text-slate-500 mb-1.5 block">Ghi chú (tùy chọn)</label>
      <textarea rows="3" class="w-full border-2 border-slate-200 focus:border-emerald-400 rounded-xl px-4 py-3 text-sm outline-none resize-none" placeholder="Mô tả thêm về hoạt động..."></textarea>
    </div>

    <button class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold py-3.5 rounded-xl text-sm flex items-center justify-center gap-2">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
      Xác nhận EcoAction · +<span id="btn-gp">50</span> GP
    </button>
  </div>

  <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-sm bg-white border-t border-slate-200 flex">
    <a href="dashboard.html" class="flex-1 flex flex-col items-center py-2.5 gap-0.5 text-slate-400"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg><span class="text-[9px] font-semibold">Trang chủ</span></a>
    <a href="tour-detail.html" class="flex-1 flex flex-col items-center py-2.5 gap-0.5 text-slate-400"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg><span class="text-[9px] font-semibold">Tour</span></a>
    <a href="eco-action.html" class="flex-1 flex flex-col items-center py-2.5 gap-0.5 text-emerald-600"><span class="text-xl leading-none">🌿</span><span class="text-[9px] font-semibold">Eco</span></a>
    <a href="expense-entry.html" class="flex-1 flex flex-col items-center py-2.5 gap-0.5 text-slate-400"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><span class="text-[9px] font-semibold">Chi phí</span></a>
    <a href="incident-report.html" class="flex-1 flex flex-col items-center py-2.5 gap-0.5 text-slate-400"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg><span class="text-[9px] font-semibold">Sự cố</span></a>
  </nav>
</div>
<script>
let pax=18;
function updateGP(sel){
  const gp=parseInt(sel.value);
  document.getElementById('gp-val').textContent=gp;
  document.getElementById('gp-total').textContent=gp*pax;
  document.getElementById('btn-gp').textContent=gp;
}
function adjustPax(d){
  pax=Math.max(1,Math.min(20,pax+d));
  document.getElementById('pax-val').textContent=pax+' khách';
  const gp=parseInt(document.querySelector('select').value);
  document.getElementById('gp-total').textContent=gp*pax;
}
</script>
</body>
</html>
